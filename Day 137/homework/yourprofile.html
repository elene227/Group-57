<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Cyan Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #040e1f, #062929);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
header{
    background-color: #1a1741;
    display: flex;
    justify-content: space-between;
    padding: 15px 100px;
    align-items: center;
    border-bottom: #00ccff solid 1px;
    width: 100%;
    position: fixed;
    top: 0;
}

header nav{
    display: flex;
    justify-content: center;
    align-items: center;
    gap:100px
}

header nav a{
    color: rgb(206, 218, 237);
    text-decoration: none;
    font-size: 19px;
    font-weight: 600;
}

.start{
    padding: 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: rgb(245, 250, 255);
    box-shadow: 0 0 10px #054656, inset 0 0 10px rgba(10, 0, 86, 0.73);
}
.start a{
    color:#0A192F
}

.jobimg{
    width: 20%;
    height: 75px;
    border-radius: 20px;
    object-fit: cover;
    display: inline-block;
}




.profile-card {
    width: 650px;
    background: #0e2a3f;
    display: flex;
    padding: 25px;
    border-radius: 14px;
    border: 2px solid #6fdfff;
    box-shadow: 0 0 30px rgba(111, 223, 255, 0.25);
    color: #e0ffff;
}

.profile-photo img {
    width: 160px;
    height: 160px;
    border-radius: 12px;
    object-fit: cover;
    border: 3px solid #6fdfff;
}

.profile-info {
    margin-left: 25px;
    flex: 1;
}

.profile-info label {
    display: block;
    margin-top: 12px;
    font-size: 14px;
    color: #9fefff;
}

.field-row {
    display: flex;
    gap: 8px;
    align-items: center;
}

.profile-info input,
.profile-info textarea {
    flex: 1;
    background: #062f2f;
    border: 1px solid #6fdfff;
    border-radius: 6px;
    padding: 8px;
    color: #e0ffff;
    margin-top: 4px;
    outline: none;
    transition: 
        border 0.25s ease,
        box-shadow 0.25s ease,
        transform 0.15s ease;
}

.profile-info input:hover,
.profile-info textarea:hover {
    border-color: #aaf5ff;
    box-shadow: 0 0 10px rgba(170, 245, 255, 0.6);
    transform: translateY(-2px);
}

.profile-info input:focus,
.profile-info textarea:focus {
    border-color: #aaf5ff;
    box-shadow: 0 0 12px rgba(170, 245, 255, 0.8);
    transform: translateY(-2px);
}

.toggle-btn {
    margin-top: 4px;
    background: #062f2f;
    border: 1px solid #6fdfff;
    color: #9fefff;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    transition: 
        background 0.25s ease,
        box-shadow 0.25s ease,
        transform 0.15s ease,
        color 0.25s ease;
}

.toggle-btn:hover {
    background: #0b5c5c;
    color: #eaffff;
    box-shadow: 0 0 12px rgba(170, 245, 255, 0.8);
    transform: translateY(-2px);
}

.toggle-btn:active {
    transform: translateY(0);
    box-shadow: 0 0 6px rgba(170, 245, 255, 0.4);
}

.profile-info textarea {
    height: 90px;
    resize: none;
}
</style>
</head>

<body>
    <header>
       <img class="jobimg" src="https://cdn.dribbble.com/userupload/35981999/file/original-9d335257f6d1e771b1c5aa97274601e0.jpg?resize=400x0" alt="">
        <nav>
           
            <a href="groupp.html"><ion-icon name="home-outline"></ion-icon> HOME</a>
            <a href="aboutus.html"><ion-icon name="call-outline"></ion-icon> ABOUT US</a>
            <a href="info.html"><ion-icon name="earth-outline"></ion-icon> NEWS</a>
            <button id="users" class="start"><a href="register.html">Get Started for Free!</a></button>
            <a id="you" href="yourprofile.html"><ion-icon name="person-circle-outline"> </ion-icon><p id="p"></p></a>
        </nav>
    </header>

<div class="profile-card">
    <div class="profile-photo">
        <img id="profileImage" src="" alt="Profile Photo">
    </div>

    <div class="profile-info">
        <label>Name</label>
        <input type="text" id="name" readonly>

        <label>Password</label>
        <div class="field-row">
            <input type="password" id="password" readonly>
            <button class="toggle-btn" onclick="togglePassword()">Show</button>
        </div>

        <label>Profession</label>
        <input type="text" id="profession" readonly>

        <label>Experience</label>
        <textarea placeholder="Write your experience here..." id="experience"></textarea>
    </div>
</div>

<script>
const nameValue = localStorage.getItem("name");
const passwordValue = localStorage.getItem('password');
const jobType = localStorage.getItem("quizResult");


const experience0 = document.getElementById("experience");
const exp = "autosaveContent";

experience0.value = localStorage.getItem(exp) || "";

  experience0.addEventListener('input', () => {
    localStorage.setItem(exp, experience0.value);
  });


const images = {
    Labor: "Labour.png",
    Medical: "Medic.png",
    Humanities: "Human.jpg",
    Tech: "Tech.png"
};

document.getElementById("name").value = nameValue || "Unknown";
document.getElementById("password").value = passwordValue || "Unknown";
document.getElementById("profession").value = jobType || "Unknown";

document.getElementById("profileImage").src =
// images= container jobtype = box

    images[jobType] || "Unemployed.jpg";

function togglePassword() {
    const passInput = document.getElementById("password");
    const btn = event.target;

    if (passInput.type === "password") {
        passInput.type = "text";
        btn.textContent = "Hide";
    } else {
        passInput.type = "password";
        btn.textContent = "Show";
    }
}

</script>

</body>
</html>
