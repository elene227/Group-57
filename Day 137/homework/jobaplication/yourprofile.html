<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Cyan Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #040e1f, #062929);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.profile-card {
    width: 650px;
    background: #0e2a3f;
    display: flex;
    padding: 25px;
    border-radius: 14px;
    border: 2px solid #6fdfff;
    box-shadow: 0 0 30px rgba(111, 223, 255, 0.25);
    color: #e0ffff;
}

.profile-photo img {
    width: 160px;
    height: 160px;
    border-radius: 12px;
    object-fit: cover;
    border: 3px solid #6fdfff;
}

.profile-info {
    margin-left: 25px;
    flex: 1;
}

.profile-info label {
    display: block;
    margin-top: 12px;
    font-size: 14px;
    color: #9fefff;
}

.field-row {
    display: flex;
    gap: 8px;
    align-items: center;
}

.profile-info input,
.profile-info textarea {
    flex: 1;
    background: #062f2f;
    border: 1px solid #6fdfff;
    border-radius: 6px;
    padding: 8px;
    color: #e0ffff;
    margin-top: 4px;
    outline: none;
    transition: 
        border 0.25s ease,
        box-shadow 0.25s ease,
        transform 0.15s ease;
}

.profile-info input:hover,
.profile-info textarea:hover {
    border-color: #aaf5ff;
    box-shadow: 0 0 10px rgba(170, 245, 255, 0.6);
    transform: translateY(-2px);
}

.profile-info input:focus,
.profile-info textarea:focus {
    border-color: #aaf5ff;
    box-shadow: 0 0 12px rgba(170, 245, 255, 0.8);
    transform: translateY(-2px);
}

.toggle-btn {
    margin-top: 4px;
    background: #062f2f;
    border: 1px solid #6fdfff;
    color: #9fefff;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    transition: 
        background 0.25s ease,
        box-shadow 0.25s ease,
        transform 0.15s ease,
        color 0.25s ease;
}

.toggle-btn:hover {
    background: #0b5c5c;
    color: #eaffff;
    box-shadow: 0 0 12px rgba(170, 245, 255, 0.8);
    transform: translateY(-2px);
}

.toggle-btn:active {
    transform: translateY(0);
    box-shadow: 0 0 6px rgba(170, 245, 255, 0.4);
}

.profile-info textarea {
    height: 90px;
    resize: none;
}
</style>
</head>

<body>

<div class="profile-card">
    <div class="profile-photo">
        <img id="profileImage" src="" alt="Profile Photo">
    </div>

    <div class="profile-info">
        <label>Name</label>
        <input type="text" id="name" readonly>

        <label>Password</label>
        <div class="field-row">
            <input type="password" id="password" readonly>
            <button class="toggle-btn" onclick="togglePassword()">Show</button>
        </div>

        <label>Profession</label>
        <input type="text" id="profession" readonly>

        <label>Experience</label>
        <textarea placeholder="Write your experience here..." id="experience"></textarea>
    </div>
</div>

<script>
const info = JSON.parse(localStorage.getItem("userinfo"));
const nameValue = info.username || "Unknown";
const passwordValue = info.password || "Unknown";
const jobType = localStorage.getItem("quizResult");


const experience0 = document.getElementById("experience");
const exp = "autosaveContent";

experience0.value = localStorage.getItem(exp) || "";

  experience0.addEventListener('input', () => {
    localStorage.setItem(exp, experience0.value);
  });


const images = {
    Labor: "labor.png",
    Medical: "medical.png",
    Humanities: "humanities0.jpg",
    Tech: "tech.png"
};

document.getElementById("name").value = nameValue || "Unknown";
document.getElementById("password").value = passwordValue || "Unknown";
document.getElementById("profession").value = jobType || "Unknown";

document.getElementById("profileImage").src =
    images[jobType] || "jobjob.jpg";

function togglePassword() {
    const passInput = document.getElementById("password");
    const btn = event.target;

    if (passInput.type === "password") {
        passInput.type = "text";
        btn.textContent = "Hide";
    } else {
        passInput.type = "password";
        btn.textContent = "Show";
    }
}
</script>

</body>
</html>
