    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Calculator app</title>

  <link rel="stylesheet" href="for.css">
  </style>
</head>
<body>

    

  <div class="Calculator">
    <div class="calculatortheme">
        <p class="calc">calc</p>

        <div class="theme">
          <p class="t">theme</p>
          <div class="numbers">
            <p class="a123">123</p>
            <div class="themebutton">
              <div class="redcircle"></div>
            </div>
          </div>
        </div>
    </div>

    
  <div class="display" id="display">  
      <p style="font-size: 20px; color:white" id="calcs"></p>
      <p></p>
  </div>
  <div class="nums">
    <div class="num">7</div>
    <div class="num">8</div>
    <div class="num">9</div>
    <div id="delete">DEL</div>

    <div class="num">4</div>
    <div class="num">5</div>
    <div class="num">6</div>
    <div id="plus">+</div>

    <div class="num">1</div>
    <div class="num">2</div>
    <div class="num">3</div>
    <div id="minus">-</div>

    <div class="num">.</div>
    <div class="num">0</div>
    <div id="divide">/</div>
    <div id="multi">x</div>
    <div id="equal">=</div>

  </div>



  </div>

  <script src="for.js">

  </script>
</body>
</html>
